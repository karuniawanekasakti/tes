<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save Contact</title>
<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f4f4f4;
}
button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}
button:hover { background: #1d4ed8; }
</style>
</head>
<body>
<button id="saveContact">Save Contact</button>

<script>
const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Karuniawan Kaka
ORG:PT Example
TITLE:Software Engineer
TEL;TYPE=CELL:+6281234567890
EMAIL:karuniawan@email.com
URL:https://example.com
END:VCARD`;

function isIOS() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

function isAndroid() {
    return /Android/.test(navigator.userAgent);
}

document.getElementById("saveContact").addEventListener("click", () => {
    const blob = new Blob([vcard], { type: "text/x-vcard" });

    if (isIOS()) {
        // iOS Safari: native handler, langsung muncul Contact Card
        const url = URL.createObjectURL(blob);
        window.location.href = url;
        setTimeout(() => URL.revokeObjectURL(url), 3000);
        return;
    }

    if (isAndroid()) {
        // Android: encode vCard ke data URI dan buka via intent
        // Intent URI langsung membuka app Contacts tanpa download
        const encoded = encodeURIComponent(vcard);
        const intentUrl =
            `intent:data:text/x-vcard,${encoded}#Intent;` +
            `action=android.intent.action.VIEW;` +
            `type=text/x-vcard;` +
            `end`;
        window.location.href = intentUrl;
        return;
    }

    // Desktop fallback: download file .vcf
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "contact.vcf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
});
</script>
</body>
</html>
