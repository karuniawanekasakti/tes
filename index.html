<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kartu Nama Digital</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #f3f4f6;
            font-family: Arial, sans-serif;
        }

        .card {
            width: 100%;
            max-width: 380px;
            padding: 30px;
            text-align: center;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .avatar {
            width: 110px;
            height: 110px;
            margin-bottom: 16px;
            border-radius: 50%;
            object-fit: cover;
            background: #e5e7eb;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 25px;
        }

        .position {
            margin: 0 0 5px;
            color: #4b5563;
        }

        .company {
            margin: 0 0 22px;
            color: #6b7280;
        }

        .contact-info {
            margin-bottom: 24px;
            line-height: 1.8;
        }

        .contact-info a {
            color: #111827;
            text-decoration: none;
        }

        .button {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #111827;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .button:hover {
            background: #374151;
        }
    </style>
</head>

<body>

    <main class="card">
        <img
            class="avatar"
            src="profile.jpg"
            alt="Foto profil"
        >

        <h1>Eka Karuniawan</h1>

        <p class="position">Software Engineer</p>
        <p class="company">PT MTI</p>

        <div class="contact-info">
            <div>
                <a href="tel:+628123456789">
                    +62 812-3456-789
                </a>
            </div>

            <div>
                <a href="mailto:eka@example.com">
                    eka@example.com
                </a>
            </div>

            <div>
                <a href="https://example.com" target="_blank">
                    example.com
                </a>
            </div>
        </div>

        <button class="button" onclick="downloadVCard()">
            Add to Contact
        </button>
    </main>

    <script>
        function downloadVCard() {
            const vCard = [
                "BEGIN:VCARD",
                "VERSION:3.0",
                "N:Karuniawan;Eka;;;",
                "FN:Eka Karuniawan",
                "ORG:PT MTI",
                "TITLE:Software Engineer",
                "TEL;TYPE=CELL:+628123456789",
                "EMAIL;TYPE=WORK:eka@example.com",
                "URL:https://example.com",
                "ADR;TYPE=WORK:;;Jakarta;;;Indonesia",
                "END:VCARD"
            ].join("\r\n");

            const blob = new Blob(
                [vCard],
                {
                    type: "text/vcard;charset=utf-8"
                }
            );

            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");

            link.href = url;
            link.download = "eka-karuniawan.vcf";

            document.body.appendChild(link);

            link.click();
            link.remove();

            URL.revokeObjectURL(url);
        }
    </script>

</body>
</html>
