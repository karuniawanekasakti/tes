<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontak Eka Sak</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .card {
      width: 100%;
      max-width: 380px;
      padding: 30px;
      text-align: center;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    .avatar {
      width: 96px;
      height: 96px;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: #111827;
      color: white;
      font-size: 32px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    .company {
      margin: 0 0 24px;
      color: #6b7280;
    }

    .info {
      margin-bottom: 24px;
      line-height: 1.9;
    }

    .info a {
      color: #111827;
      text-decoration: none;
    }

    .button {
      display: block;
      width: 100%;
      padding: 14px 18px;
      border-radius: 10px;
      background: #111827;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }

    .button:active {
      transform: scale(0.99);
    }

    .hint {
      margin: 12px 0 0;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="avatar">ES</div>

    <h1>Eka Sak</h1>
    <p class="company">mit</p>

    <div class="info">
      <div><a href="tel:+635643565">+63 564 3565</a></div>
      <div><a href="mailto:wkwk@mail.com">wkwk@mail.com</a></div>
    </div>

    <a class="button" href="contact.vcf" type="text/vcard">
      Add to Contact
    </a>

    <p class="hint">
      Pada Chromium, file VCF mungkin diunduh terlebih dahulu.
      Buka file tersebut untuk menambahkan kontak.
    </p>
  </main>
</body>
</html>
