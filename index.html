<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save Contact</title>
<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f4f4f4;
}
button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    cursor: pointer;
}
button:hover { background: #1d4ed8; }
</style>
</head>
<body>
<button id="saveContact">Save Contact</button>

<script>
const vcard = `BEGIN:VCARD\r\nVERSION:3.0\r\nFN:Karuniawan Kaka\r\nORG:PT Example\r\nTITLE:Software Engineer\r\nTEL;TYPE=CELL:+6281234567890\r\nEMAIL:karuniawan@email.com\r\nURL:https://example.com\r\nEND:VCARD`;

function isIOS() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

function isAndroid() {
    return /Android/.test(navigator.userAgent);
}

document.getElementById("saveContact").addEventListener("click", () => {

    if (isIOS()) {
        // iOS: pakai <a href="data:..."> yang di-click langsung di event handler
        // Harus dalam user gesture (click), tidak boleh async/setTimeout
        const dataUri = "data:text/x-vcard;charset=utf-8," + encodeURIComponent(vcard);
        const a = document.createElement("a");
        a.href = dataUri;
        a.click();
        return;
    }

    if (isAndroid()) {
        const encoded = encodeURIComponent(vcard);
        const intentUrl =
            `intent:data:text/x-vcard,${encoded}#Intent;` +
            `action=android.intent.action.VIEW;` +
            `type=text/x-vcard;` +
            `end`;
        window.location.href = intentUrl;
        return;
    }

    // Desktop fallback
    const blob = new Blob([vcard], { type: "text/x-vcard" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "contact.vcf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
});
</script>
</body>
</html>
